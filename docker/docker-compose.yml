# AuditQuant Docker Compose - Analysis Tools
# Build: docker compose -f docker/docker-compose.yml build
# Run:   docker compose -f docker/docker-compose.yml up -d
services:
  # Static Analysis - AST-level analysis (fast, broad coverage)
  slither:
    platform: linux/amd64
    build:
      context: ..
      dockerfile: docker/slither/Dockerfile
    environment:
      # Ensure pip-installed tools (e.g. solc-select) are on PATH for all subprocesses.
      PATH: /usr/local/bin:/usr/local/sbin:/usr/sbin:/usr/bin:/sbin:/bin
    volumes:
      - ../:/work
    working_dir: /work

  # DeFi-specific detectors (Pessimistic.io) - readonly reentrancy, ERC4626 inflation,
  # price oracle manipulation, unprotected initializers
  slitherin:
    platform: linux/amd64
    build:
      context: ..
      dockerfile: docker/slitherin/Dockerfile
    environment:
      PATH: /usr/local/bin:/usr/local/sbin:/usr/sbin:/usr/bin:/sbin:/bin
    volumes:
      - ../:/work
    working_dir: /work

  # Dynamic Analysis - Symbolic execution (precise, proves exploitability)
  mythril:
    platform: linux/amd64
    build:
      context: ..
      dockerfile: docker/mythril/Dockerfile
    environment:
      PATH: /usr/local/bin:/usr/local/sbin:/usr/sbin:/usr/bin:/sbin:/bin
    volumes:
      - ../:/work
    working_dir: /work

  # Pattern-based Analysis - local Solidity rule set (fast, no network)
  semgrep:
    build:
      context: ..
      dockerfile: docker/semgrep/Dockerfile
    volumes:
      - ../:/work
    working_dir: /work
