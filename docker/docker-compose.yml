# AuditQuant Docker Compose — Analysis Tools
# Build: docker compose -f docker/docker-compose.yml build
# Run:   docker compose -f docker/docker-compose.yml up -d
services:
  # Static Analysis — AST-level analysis (fast, broad coverage)
  slither:
    build:
      context: ..
      dockerfile: docker/slither/Dockerfile
    volumes:
      - ../:/work
    working_dir: /work

  # Dynamic Analysis — Symbolic execution (precise, proves exploitability)
  mythril:
    build:
      context: ..
      dockerfile: docker/mythril/Dockerfile
    volumes:
      - ../:/work
    working_dir: /work

  # Bytecode Analysis — Compiled bytecode analysis (low-level flaws)
  oyente:
    # Oyente depends on legacy prebuilt linux/amd64 binaries (geth, solc).
    # Force amd64 so it works on Apple Silicon via emulation.
    platform: linux/amd64
    build:
      context: ..
      dockerfile: docker/oyente/Dockerfile
    volumes:
      - ../:/work
    working_dir: /work
